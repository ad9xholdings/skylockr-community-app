# SkyLockr Community App - Discourse Docker Configuration
# Production-ready Discourse stack with PostgreSQL, Redis, and S3

version: '3.8'

services:
  # Discourse Application
  discourse:
    build:
      context: ./discourse
      dockerfile: Dockerfile
      args:
        RUBY_VERSION: "3.2"
        RAILS_ENV: production
    container_name: skylockr-discourse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - discourse-data:/var/www/discourse/public/uploads
      - discourse-logs:/var/www/discourse/log
      - ./theme:/var/www/discourse/plugins/skylockr-theme:ro
      - ./wallet-integration:/var/www/discourse/plugins/xrp-wallet:ro
    environment:
      # Database Configuration
      DISCOURSE_DB_HOST: postgres
      DISCOURSE_DB_PORT: 5432
      DISCOURSE_DB_NAME: skylockr_discourse
      DISCOURSE_DB_USER: skylockr
      DISCOURSE_DB_PASSWORD: ${DB_PASSWORD:-skylockr_secure_2026}
      DISCOURSE_DB_POOL: 25
      
      # Redis Configuration
      DISCOURSE_REDIS_HOST: redis
      DISCOURSE_REDIS_PORT: 6379
      DISCOURSE_REDIS_DB: 0
      
      # App Configuration
      DISCOURSE_HOSTNAME: ${DISCOURSE_HOSTNAME:-community.skylockr.com}
      DISCOURSE_DEVELOPER_EMAILS: ${DEVELOPER_EMAILS:-admin@skylockr.com}
      DISCOURSE_SMTP_ADDRESS: ${SMTP_ADDRESS:-smtp.sendgrid.net}
      DISCOURSE_SMTP_PORT: ${SMTP_PORT:-587}
      DISCOURSE_SMTP_USER_NAME: ${SMTP_USER}
      DISCOURSE_SMTP_PASSWORD: ${SMTP_PASSWORD}
      DISCOURSE_SMTP_ENABLE_START_TLS: true
      
      # S3 Configuration for uploads
      DISCOURSE_S3_ENABLED: ${S3_ENABLED:-false}
      DISCOURSE_S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      DISCOURSE_S3_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      DISCOURSE_S3_REGION: ${S3_REGION:-us-east-1}
      DISCOURSE_S3_UPLOAD_BUCKET: ${S3_BUCKET:-skylockr-uploads}
      
      # XRP Ledger Configuration
      XRP_LEDGER_NETWORK: ${XRP_NETWORK:-mainnet}
      XRP_LEDGER_RPC: ${XRP_RPC:-https://s1.ripple.com:51234}
      XUMM_API_KEY: ${XUMM_API_KEY}
      XUMM_API_SECRET: ${XUMM_API_SECRET}
      
      # SkyLockr Specific
      SKYLOCKR_BRAND_PRIMARY: "#002145"
      SKYLOCKR_BRAND_SECONDARY: "#003594"
      SKYLOCKR_BRAND_ACCENT: "#7F9695"
      SKYLOCKR_MEMBERSHIP_TIERS: "entry,pro,master,prime"
      JAMZIA_SSO_ENDPOINT: ${JAMZIA_SSO:-https://auth.jamzia.com}
      
      # Security
      DISCOURSE_SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_ENV: production
      UNICORN_WORKERS: 4
      UNICORN_SIDEKIQS: 2
      
    networks:
      - skylockr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: skylockr-postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_USER: skylockr
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skylockr_secure_2026}
      POSTGRES_DB: skylockr_discourse
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    networks:
      - skylockr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skylockr -d skylockr_discourse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres 
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.7
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=5242kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: skylockr-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks:
      - skylockr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Sidekiq Background Jobs
  sidekiq:
    build:
      context: ./discourse
      dockerfile: Dockerfile
    container_name: skylockr-sidekiq
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - discourse-data:/var/www/discourse/public/uploads
      - ./theme:/var/www/discourse/plugins/skylockr-theme:ro
      - ./wallet-integration:/var/www/discourse/plugins/xrp-wallet:ro
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgres://skylockr:${DB_PASSWORD:-skylockr_secure_2026}@postgres:5432/skylockr_discourse
    command: bundle exec sidekiq -e production -c 5
    networks:
      - skylockr-network

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: skylockr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
      - discourse-data:/var/www/discourse/public/uploads:ro
    depends_on:
      - discourse
    networks:
      - skylockr-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # XRP Ledger WebSocket Service
  xrp-websocket:
    build:
      context: ./wallet-integration/websocket
      dockerfile: Dockerfile
    container_name: skylockr-xrp-ws
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      XRP_NETWORK: ${XRP_NETWORK:-mainnet}
      XRP_WS_URL: ${XRP_WS_URL:-wss://s1.ripple.com}
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - redis
    networks:
      - skylockr-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: skylockr-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - skylockr-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: skylockr-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
    networks:
      - skylockr-network

volumes:
  discourse-data:
    driver: local
  discourse-logs:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  skylockr-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
